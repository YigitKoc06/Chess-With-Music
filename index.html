<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chess With Music</title>
    <link rel="icon" type="image/png" href="png-transparent-chess-figure-white-pawn-thumbnail.png">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chessboard.js CSS -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Start Overlay (Required to start audio due to browser policies) -->
    <div id="startOverlay" class="start-overlay">
        <div class="overlay-content" style="position: relative;">
            <button id="overlayLangBtn" class="overlay-lang-btn" title="Switch Language">
                <i class="fa-solid fa-language"></i> <span id="overlayLangLabel">EN</span>
            </button>
            <h1>Chess With Music</h1>
            <p data-i18n="overlayDesc">Sade, zorlayıcı ve lo-fi atmosferli satranç deneyimi.</p>
            <div class="difficulty-select">
                <label data-i18n="difficultyLabel">Zorluk:</label>
                <select id="difficulty">
                    <option value="1" data-i18n="easy1">Kolay (Derinlik 1)</option>
                    <option value="2" data-i18n="medium2">Orta (Derinlik 2)</option>
                    <option value="3" selected data-i18n="hard3">Zor (Derinlik 3)</option>
                    <option value="4" data-i18n="veryHard4">Çok Zor (Derinlik 4 - Yavaş)</option>
                </select>
            </div>
            <button id="startGameBtn" class="primary-btn">
                <i class="fa-solid fa-play"></i> <span data-i18n="startGame">Oyuna Başla</span>
            </button>
        </div>
    </div>

    <!-- Mobile Toggle Buttons -->
    <button id="mobileMenuBtn" class="mobile-toggle-btn mobile-menu-btn" aria-label="Menü">
        <i class="fa-solid fa-bars"></i>
    </button>
    <button id="mobileMusicBtn" class="mobile-toggle-btn mobile-music-btn" aria-label="Müzik ve Hamle Geçmişi">
        <i class="fa-solid fa-music"></i>
    </button>

    <!-- Mobile Overlay (closes drawers) -->
    <div id="mobileOverlay" class="mobile-overlay"></div>

    <!-- Main Container -->
    <div class="container">
        
        <!-- Sidebar / Player Info -->
        <div class="sidebar">
            <div class="player-info bot-info">
                <div class="avatar bot-avatar">
                    <i class="fa-solid fa-robot"></i>
                </div>
                <div class="details">
                    <div class="name" id="botName" data-i18n="botBlack">Bot (Siyah)</div>
                    <div class="status" id="botStatus" data-i18n="waiting">Bekleniyor...</div>
                </div>
            </div>

            <div class="sidebar-controls">
                <div class="control-box">
                    <span data-i18n="botDifficulty">Bot Zorluğu</span>
                    <select id="inGameDifficulty" class="sidebar-select">
                        <option value="1" data-i18n="easy">Kolay</option>
                        <option value="2" data-i18n="medium">Orta</option>
                        <option value="3" selected data-i18n="hard">Zor</option>
                        <option value="4" data-i18n="veryHard">Çok Zor</option>
                    </select>
                </div>
                <div class="control-box">
                    <span data-i18n="restart">Yeniden Başlat</span>
                    <button id="resetBtn" class="sidebar-btn"><i class="fa-solid fa-rotate-right"></i></button>
                </div>
                <div class="control-box">
                    <span data-i18n="switchSide">Taraf Değiştir</span>
                    <button id="switchSideBtn" class="sidebar-btn"><i class="fa-solid fa-retweet"></i></button>
                </div>
                <div class="control-box">
                    <span data-i18n="language">Dil</span>
                    <button id="langToggleBtn" class="sidebar-btn"><i class="fa-solid fa-language"></i> <span id="langLabel">EN</span></button>
                </div>
            </div>

            <div class="player-info user-info">
                <div class="avatar user-avatar">
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="details">
                    <div class="name" id="userName" data-i18n="youWhite">Sen (Beyaz)</div>
                    <div class="status" data-i18n="yourTurnWaiting">Sıra sende mi? Bekleniyor...</div>
                </div>
            </div>
        </div>

        <!-- Board Area -->
        <div class="board-area">
            <div id="myBoard" class="chessboard"></div>
        </div>

        <!-- Right Panel / Move History -->
        <div class="right-panel">
            <div class="panel-header">
                <h3 data-i18n="moveHistory">Hamle Geçmişi</h3>
            </div>
            <div class="move-history" id="moveHistory">
                <!-- Move pairs will be dynamically injected here -->
            </div>
            <!-- Music Player -->
            <div class="music-player">
                <div class="spotify-input-container">
                    <input type="text" id="spotifyInput" placeholder="Spotify Linki (Track, Playlist vb.)" data-i18n-placeholder="spotifyInputPlaceholder">
                    <button id="loadSpotifyBtn" title="Yükle" data-i18n-title="loadSpotifyBtn"><i class="fa-solid fa-check"></i></button>
                </div>
                <!-- Default Lofi Playlist, lazy loaded to prevent UI block -->
                <iframe id="spotifyIframe" style="border-radius:12px" src="https://open.spotify.com/embed/playlist/0vvXsWCC9xrXsKd4FyS8kM?utm_source=generator&theme=0" width="100%" height="80" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
            </div>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div id="gameOverOverlay" class="game-over-overlay">
        <div class="game-over-modal">
            <div class="game-over-icon" id="gameOverIcon">
                <i class="fa-solid fa-crown"></i>
            </div>
            <h2 class="game-over-title" id="gameOverTitle">Beyaz Kazandı!</h2>
            <p class="game-over-subtitle" id="gameOverSubtitle">Mat ile</p>
            <div class="game-over-actions">
                <button id="gameOverReplay" class="game-over-btn replay-btn">
                    <i class="fa-solid fa-rotate-right"></i>
                    <span data-i18n="playAgain">Yeniden Oyna</span>
                </button>
                <button id="gameOverDifficulty" class="game-over-btn difficulty-btn">
                    <i class="fa-solid fa-sliders"></i>
                    <span data-i18n="adjustDifficulty">Zorluğu Ayarla</span>
                </button>
                <button id="gameOverSwitch" class="game-over-btn switch-btn">
                    <i class="fa-solid fa-retweet"></i>
                    <span data-i18n="switchSide">Taraf Değiştir</span>
                </button>
            </div>
        </div>
    </div>

    <!-- QR Code Button -->
    <button id="qrBtn" class="qr-fab" title="QR Code" aria-label="QR Code">
        <i class="fa-solid fa-qrcode"></i>
    </button>

    <!-- QR Code Popup -->
    <div id="qrOverlay" class="qr-overlay">
        <div class="qr-popup">
            <button id="qrClose" class="qr-close" aria-label="Close">&times;</button>
            <img src="extended.png" alt="QR Code" class="qr-image">
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast">Oyun Başladı!</div>

    <!-- jQuery (required for chessboard.js) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Chessboard.js -->
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <!-- Chess.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <!-- Custom Logic -->
    <script src="script.js?v=20240421"></script>
</body>
</html>
