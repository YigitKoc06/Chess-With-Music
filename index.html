<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chess With Music</title>
    <link rel="icon" type="image/png" href="png-transparent-chess-figure-white-pawn-thumbnail.png">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chessboard.js CSS -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Start Overlay (Required to start audio due to browser policies) -->
    <div id="startOverlay" class="start-overlay">
        <div class="overlay-content">
            <h1>Chess With Music</h1>
            <p>Sade, zorlayıcı ve lo-fi atmosferli satranç deneyimi.</p>
            <div class="difficulty-select">
                <label>Zorluk:</label>
                <select id="difficulty">
                    <option value="1">Kolay (Derinlik 1)</option>
                    <option value="2">Orta (Derinlik 2)</option>
                    <option value="3" selected>Zor (Derinlik 3)</option>
                    <option value="4">Çok Zor (Derinlik 4 - Yavaş)</option>
                </select>
            </div>
            <button id="startGameBtn" class="primary-btn">
                <i class="fa-solid fa-play"></i> Oyuna Başla
            </button>
        </div>
    </div>

    <!-- Mobile Toggle Buttons -->
    <button id="mobileMenuBtn" class="mobile-toggle-btn mobile-menu-btn" aria-label="Menü">
        <i class="fa-solid fa-bars"></i>
    </button>
    <button id="mobileMusicBtn" class="mobile-toggle-btn mobile-music-btn" aria-label="Müzik ve Hamle Geçmişi">
        <i class="fa-solid fa-music"></i>
    </button>

    <!-- Mobile Overlay (closes drawers) -->
    <div id="mobileOverlay" class="mobile-overlay"></div>

    <!-- Main Container -->
    <div class="container">
        
        <!-- Sidebar / Player Info -->
        <div class="sidebar">
            <div class="player-info bot-info">
                <div class="avatar bot-avatar">
                    <i class="fa-solid fa-robot"></i>
                </div>
                <div class="details">
                    <div class="name">Bot (Siyah)</div>
                    <div class="status" id="botStatus">Bekleniyor...</div>
                </div>
            </div>

            <div class="sidebar-controls">
                <div class="control-box">
                    <span>Bot Zorluğu</span>
                    <select id="inGameDifficulty" class="sidebar-select">
                        <option value="1">Kolay</option>
                        <option value="2">Orta</option>
                        <option value="3" selected>Zor</option>
                        <option value="4">Çok Zor</option>
                    </select>
                </div>
                <div class="control-box">
                    <span>Yeniden Başlat</span>
                    <button id="resetBtn" class="sidebar-btn"><i class="fa-solid fa-rotate-right"></i></button>
                </div>
                <div class="control-box">
                    <span>Taraf Değiştir</span>
                    <button id="switchSideBtn" class="sidebar-btn"><i class="fa-solid fa-retweet"></i></button>
                </div>
            </div>

            <div class="player-info user-info">
                <div class="avatar user-avatar">
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="details">
                    <div class="name">Sen (Beyaz)</div>
                    <div class="status">Sıra sende mi? Bekleniyor...</div>
                </div>
            </div>
        </div>

        <!-- Board Area -->
        <div class="board-area">
            <div id="myBoard" class="chessboard"></div>
        </div>

        <!-- Right Panel / Move History -->
        <div class="right-panel">
            <div class="panel-header">
                <h3>Hamle Geçmişi</h3>
            </div>
            <div class="move-history" id="moveHistory">
                <!-- Move pairs will be dynamically injected here -->
            </div>
            <!-- Music Player -->
            <div class="music-player">
                <div class="music-info">
                    <i class="fa-solid fa-compact-disc fa-spin" id="musicSpinIcon" style="animation-play-state: paused;"></i>
                    <span id="trackTitle">Abstract (Lofi)</span>
                </div>
                <div class="progress-container" style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; color: var(--text-secondary); padding: 0 0.5rem;">
                    <span id="currentTime">0:00</span>
                    <input type="range" id="progressBar" class="progress-bar" min="0" max="100" value="0" style="flex: 1;">
                    <span id="durationTime">0:00</span>
                </div>
                <div class="music-controls-container">
                    <div class="playback-controls">
                        <button class="music-btn" id="rewindBtn" title="Başa Sar"><i class="fa-solid fa-arrow-rotate-left"></i></button>
                        <button class="music-btn" id="prevTrackBtn" title="Önceki Şarkı"><i class="fa-solid fa-backward-step"></i></button>
                        <button class="music-btn play-pause" id="playPauseBtn" title="Oynat / Duraklat"><i class="fa-solid fa-play"></i></button>
                        <button class="music-btn" id="nextTrackBtn" title="Sonraki Şarkı"><i class="fa-solid fa-forward-step"></i></button>
                        <button class="music-btn" id="repeatBtn" title="Tekrarla"><i class="fa-solid fa-repeat"></i></button>
                    </div>
                    <div class="volume-controls">
                        <button class="music-btn" id="toggleMute" title="Sessize Al / Sesi Aç"><i class="fa-solid fa-volume-high"></i></button>
                        <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="0.3" title="Ses Seviyesi">
                    </div>
                </div>
                <!-- Background audio player (hidden) -->
                <audio id="lofiPlayer" preload="auto">
                    <!-- Tracks managed by JS -->
                </audio>
            </div>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div id="gameOverOverlay" class="game-over-overlay">
        <div class="game-over-modal">
            <div class="game-over-icon" id="gameOverIcon">
                <i class="fa-solid fa-crown"></i>
            </div>
            <h2 class="game-over-title" id="gameOverTitle">Beyaz Kazandı!</h2>
            <p class="game-over-subtitle" id="gameOverSubtitle">Mat ile</p>
            <div class="game-over-actions">
                <button id="gameOverReplay" class="game-over-btn replay-btn">
                    <i class="fa-solid fa-rotate-right"></i>
                    <span>Yeniden Oyna</span>
                </button>
                <button id="gameOverDifficulty" class="game-over-btn difficulty-btn">
                    <i class="fa-solid fa-sliders"></i>
                    <span>Zorluğu Ayarla</span>
                </button>
                <button id="gameOverSwitch" class="game-over-btn switch-btn">
                    <i class="fa-solid fa-retweet"></i>
                    <span>Taraf Değiştir</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast">Oyun Başladı!</div>

    <!-- jQuery (required for chessboard.js) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Chessboard.js -->
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <!-- Chess.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <!-- Custom Logic -->
    <script src="script.js"></script>
</body>
</html>
